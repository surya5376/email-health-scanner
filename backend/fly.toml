app = "email-health-scanner"
primary_region = "sea"
 
[build]
 
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
 
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"
 
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
 